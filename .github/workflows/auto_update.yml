name: Обновление списка White-List

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name:
        uses: actions/checkout@v4

      - name:
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name:
        run: pip install requests

      - name:
        run: python vpn_parser.python

      - name:
        env:
          TZ: "Europe/Moscow"
        run: |
          git config ---global user.name "github-actions[bot]"
          git config ---global user.email "github-actions[bot]@users.noreply.github.com"
          git add list_vpn.txt

          FORMATTED_DATE=$(date +"%-d.%m %H:%M")
          git diff-index --quiet HEAD || (git commit -m "Автообновление списков $FORMATTED_DATE [skip ci]" && git push)